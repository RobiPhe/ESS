<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESS — OHGISHI v6</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
[data-theme="dark"]{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--bg4:#252530;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;--accent2:#2d5be3;--accent-bg:rgba(45,91,227,.13);--shadow:0 4px 24px rgba(0,0,0,.4);--sidebar-bg:#0d1426;--topbar-bg:#0f0f13;--input-bg:#1e1e28}
[data-theme="light"]{--bg:#f0f2f8;--bg2:#fff;--bg3:#f5f6fa;--bg4:#e8eaf2;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:#1a1a2e;--text2:#5a6070;--text3:#9298a8;--accent2:#1a4fd6;--accent-bg:rgba(26,79,214,.08);--shadow:0 4px 24px rgba(0,0,0,.08);--sidebar-bg:#0d1e5c;--topbar-bg:#fff;--input-bg:#f5f6fa}
:root{--green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-b:rgba(34,197,94,.25);--red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-b:rgba(239,68,68,.25);--yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.1);--yellow-b:rgba(245,158,11,.25);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--orange:#f97316;--orange-bg:rgba(249,115,22,.1);--r:10px;--rl:16px;--rx:22px;--tr:.18s ease}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(45,91,227,.22) 0%,transparent 70%);pointer-events:none}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:48px 44px;width:420px;max-width:95vw;position:relative;z-index:1;box-shadow:var(--shadow)}
.login-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.login-logo-img{height:42px;object-fit:contain}.login-app-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent2)}
.login-sub{color:var(--text2);font-size:13px;margin-bottom:30px}
.field{margin-bottom:15px}.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color var(--tr)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent2)}
.field select option{background:var(--bg3);color:var(--text)}.field input[disabled]{opacity:.5;cursor:not-allowed}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all var(--tr);white-space:nowrap}
.btn-primary{background:var(--accent2);color:#fff;width:100%;padding:12px}.btn-primary:hover{filter:brightness(1.1)}
.btn-sm{padding:7px 14px;font-size:12px}.btn-xs{padding:4px 10px;font-size:11px}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}.btn-green:hover{background:rgba(34,197,94,.2)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}.btn-red:hover{background:rgba(239,68,68,.2)}
.btn-orange{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(249,115,22,.25)}.btn-orange:hover{background:rgba(249,115,22,.2)}
.btn-excel{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--green-b)}.btn-excel:hover{background:rgba(34,197,94,.25)}
.btn-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-b)}
.err{color:var(--red);font-size:13px;margin-top:10px;display:none}
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:234px;height:100vh;background:var(--sidebar-bg);border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-head{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sidebar-logo-img{height:30px;object-fit:contain;filter:brightness(10)}
.sidebar-app-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff}
.sb-name{font-size:13px;font-weight:500;color:#fff}.sb-role{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}.sb-nik{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
nav{padding:10px 8px;flex:1}
.nav-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.5);transition:all var(--tr);margin-bottom:1px;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}.nav-item.active{background:rgba(45,91,227,.3);color:#fff}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:600;padding:1px 6px;min-width:18px;text-align:center;display:none}.nav-badge.show{display:block}
.nav-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.07)}
.nav-logout{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.38);transition:all var(--tr)}
.nav-logout:hover{background:rgba(239,68,68,.15);color:var(--red)}.nav-logout svg{width:15px;height:15px}
.topbar{position:fixed;top:0;left:234px;right:0;height:54px;background:var(--topbar-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:0 24px;z-index:99;gap:14px}
.theme-toggle{width:36px;height:20px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;padding:2px}
.theme-knob{width:14px;height:14px;border-radius:50%;background:var(--accent2);transition:transform var(--tr)}
[data-theme="light"] .theme-knob{transform:translateX(16px)}
.theme-lbl{font-size:13px;color:var(--text2)}
.bell-wrap{position:relative;cursor:pointer;padding:6px;display:none}
.bell-wrap svg{width:18px;height:18px;color:var(--text2)}
.bell-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--topbar-bg);display:none}.bell-dot.show{display:block}
.cal-status{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:99px;cursor:pointer;font-weight:500}
.cal-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.cal-warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-b)}
.cal-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.notif-popup{position:fixed;top:62px;right:16px;z-index:900;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);width:320px;max-height:400px;overflow-y:auto;box-shadow:var(--shadow);display:none}
.notif-popup.show{display:block;animation:fadeIn .15s ease}
.notif-hdr{padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-hdr-title{font-size:13px;font-weight:600}
.notif-item{padding:11px 16px;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;transition:background var(--tr);line-height:1.5}
.notif-item:hover{background:var(--bg3)}.notif-item.unread{background:var(--accent-bg)}
.notif-item-title{font-weight:500;margin-bottom:2px}.notif-time{color:var(--text3);font-size:10px;margin-top:2px}
.notif-empty{padding:28px;text-align:center;color:var(--text3);font-size:13px}
.main{margin-left:234px;margin-top:54px;padding:26px;min-height:calc(100vh - 54px)}
.page{display:none;animation:fadeIn .2s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:14px;flex-wrap:wrap}
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.page-sub{color:var(--text2);font-size:13px;margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:17px 20px}
.stat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:700}
.stat-unit{font-size:12px;color:var(--text2);margin-left:3px;font-family:'DM Sans',sans-serif;font-weight:400}
.c-blue{color:var(--accent2)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}.c-orange{color:var(--orange)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600}
.b-pending{background:var(--yellow-bg);color:var(--yellow)}.b-approved{background:var(--green-bg);color:var(--green)}
.b-rejected{background:var(--red-bg);color:var(--red)}.b-cancelled{background:var(--bg4);color:var(--text2)}
.b-planned{background:var(--blue-bg);color:var(--blue)}.b-deduct{background:var(--accent-bg);color:var(--accent2)}
.b-neutral{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.b-national{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.b-joint{background:var(--orange-bg);color:var(--orange)}
.tw-wrap{border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tw-scroll{overflow:auto;max-height:580px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
thead tr{background:var(--bg3)}
th{padding:10px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;position:sticky;top:0;z-index:10;background:var(--bg3)}
td{padding:10px 13px;border-top:1px solid var(--border);color:var(--text)}
tbody tr:hover{background:var(--bg3)}
th.chk-col,td.chk-col{width:36px;padding:10px 8px;text-align:center}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent2)}
.filter-row th{padding:5px 8px;background:var(--bg4);top:37px}
.filter-row input,.filter-row select{width:100%;padding:5px 8px;font-size:11px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none}
.filter-row input:focus,.filter-row select:focus{border-color:var(--accent2)}
.filter-row input[type=date]{min-width:0;width:100%;font-size:10px}
.op-wrap{display:flex;gap:3px}.op-wrap select{width:52px;flex-shrink:0;padding:5px 4px}.op-wrap input{flex:1}
.lc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:15px 17px;margin-bottom:8px;transition:border-color var(--tr)}
.lc:hover{border-color:var(--border2)}
.lc-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.lc-title{font-size:14px;font-weight:500}
.lc-meta{font-size:12px;color:var(--text2);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px}
.lc-reason{font-size:12px;color:var(--text2);margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.lc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;flex-wrap:wrap;gap:7px}
.ap-steps{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap}
.ap-step{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:500}
.ap-arrow{color:var(--text3);font-size:13px}
.s-wait{background:var(--bg4);color:var(--text3)}.s-pending{background:var(--yellow-bg);color:var(--yellow)}
.s-done{background:var(--green-bg);color:var(--green)}.s-rej{background:var(--red-bg);color:var(--red)}
.dept-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.dept-block-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.dept-block-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.level-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.level-row:last-child{border-bottom:none}.level-row:nth-child(even){background:rgba(255,255,255,.015)}
.lv-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap;min-width:58px;text-align:center}
.lv1-badge{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.lv2-badge{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.person-info{flex:1;display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--accent-bg);color:var(--accent2)}
.person-name{font-size:13px;font-weight:500}.person-pos{font-size:11px;color:var(--text2);text-transform:uppercase}
.empty-level{padding:12px 16px;font-size:13px;color:var(--text3);font-style:italic}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s}
.mo.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rx);padding:26px 28px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto;transform:scale(.96) translateY(8px);transition:transform .2s;-webkit-overflow-scrolling:touch}
.mo.show .modal{transform:scale(1) translateY(0)}
@media(max-width:768px){
  .mo{padding:12px;align-items:flex-end}
  .modal{width:100%;max-height:88vh;border-radius:20px 20px 0 0;padding:22px 18px 32px}
  .modal-foot{flex-direction:column}
  .modal-foot .btn{width:100%;justify-content:center}
}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{color:var(--text2);font-size:12px;margin-bottom:20px}
.modal-foot{display:flex;gap:8px;margin-top:20px}
.alert{padding:11px 15px;border-radius:var(--r);font-size:13px;margin-bottom:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.a-warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-b)}
.a-info{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.a-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.a-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:11px 17px;font-size:13px;max-width:300px;box-shadow:var(--shadow);transform:translateY(60px);opacity:0;transition:.25s;pointer-events:none}
#toast.show{transform:none;opacity:1}
.date-row{display:flex;gap:7px;align-items:center;margin-bottom:6px}.date-row input{flex:1}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}.empty-ico{font-size:38px;margin-bottom:9px}
.upload-area{border:2px dashed var(--border2);border-radius:var(--rl);padding:34px;text-align:center;cursor:pointer;transition:all var(--tr)}
.upload-area:hover{border-color:var(--accent2);background:var(--accent-bg)}
.dec-warn{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.06));border:1px solid var(--yellow-b);border-radius:var(--rl);padding:13px 17px;margin-bottom:14px;font-size:13px;line-height:1.5}
.g2i{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.bulk-del-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--r);margin-bottom:12px;font-size:13px;color:var(--red)}
.bulk-del-bar.show{display:flex}
.saldo-y3{color:var(--red)}.saldo-y2{color:var(--yellow)}.saldo-y1{color:var(--accent2)}.saldo-big{color:var(--green)}
.qf-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.qf-btn{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all var(--tr)}
.qf-btn:hover{border-color:var(--border2);color:var(--text)}.qf-btn.active{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent2)}
.cal-month{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.cal-month-head{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:space-between}
.cal-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px}.cal-row:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.log-accrual{background:var(--green)}.log-used{background:var(--accent2)}.log-expired{background:var(--red)}.log-notif{background:var(--yellow)}
/* ══ RESPONSIVE — SIDEBAR MOBILE DRAWER ══ */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;backdrop-filter:blur(3px)}
.sidebar-overlay.show{display:block}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r);cursor:pointer;color:var(--text2);border:1px solid var(--border);background:var(--bg3);flex-shrink:0}
.hamburger svg{width:18px;height:18px}
.sidebar-close{display:none;position:absolute;top:14px;right:12px;width:30px;height:30px;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(255,255,255,.12);cursor:pointer;color:rgba(255,255,255,.5);font-size:16px}

@media(max-width:768px){
  /* Sidebar jadi drawer */
  .sidebar{transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);width:260px}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 40px rgba(0,0,0,.5)}
  .sidebar-close{display:flex}
  .topbar{left:0}
  .main{margin-left:0;padding:16px 14px;margin-top:54px}
  .hamburger{display:flex}
  /* Header action area supaya ga overflow */
  .topbar-right{display:flex;align-items:center;gap:10px}
  /* Page header stack vertical di mobile */
  .page-hdr{flex-direction:column;align-items:flex-start;gap:10px}
  .page-hdr .btn{width:100%;justify-content:center}
  /* Grid stats 2 kolom di mobile */
  .g4{grid-template-columns:1fr 1fr}
  /* Admin stat 2 col */
  .adm-grid{grid-template-columns:1fr 1fr}
  /* Chart grids jadi 1 col */
  .chart-grid,.chart-grid-3{grid-template-columns:1fr}
  /* Stat val lebih kecil */
  .adm-stat-val{font-size:26px}
  .stat-val{font-size:22px}
  /* G2i form grid 1 col */
  .g2i{grid-template-columns:1fr}
  /* Leave saldo grid 2 col */
  #leave-saldo > div{grid-template-columns:1fr 1fr !important}
  /* Table scrollable */
  .tw-wrap{border-radius:var(--r)}
  /* Modal full width */
  .modal{padding:20px 16px;border-radius:var(--rl)}
  /* Toast bottom-center */
  #toast{left:14px;right:14px;bottom:16px;max-width:unset;text-align:center}
  /* Cal status sembunyikan text panjang */
  .cal-status{font-size:11px;padding:4px 9px}
  /* Notif popup full width */
  .notif-popup{right:8px;left:8px;width:auto}
  /* QF bar scroll */
  .qf-bar{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px}
  .qf-bar::-webkit-scrollbar{height:0}
  /* Bulk del bar */
  .bulk-del-bar{flex-wrap:wrap;gap:7px}
  /* Page title lebih kecil */
  .page-title{font-size:17px}
  /* Lc hdr stack */
  .lc-hdr{flex-direction:column;gap:7px}
  .lc-hdr .badge{align-self:flex-start}
  /* Alert list di dashboard */
  .alert-row{flex-direction:column;align-items:flex-start;gap:5px}
  /* Login box */
  .login-box{padding:32px 22px}
  /* Filter row hide on mobile — show toggle */
  .filter-row{display:none}
  .filter-row.show{display:table-row}
}

@media(max-width:480px){
  /* Extra small — stat 1 col */
  .g4{grid-template-columns:1fr}
  .adm-grid{grid-template-columns:1fr}
  #leave-saldo > div{grid-template-columns:1fr 1fr !important}
  .adm-stat-val{font-size:28px}
  /* Chart tinggi lebih kecil */
  .chart-wrap[style*="220px"]{height:180px !important}
  .chart-wrap[style*="200px"]{height:160px !important}
}

@media(min-width:769px) and (max-width:1024px){
  /* Tablet — sidebar tetap tapi lebih sempit */
  .sidebar{width:200px}
  .topbar{left:200px}
  .main{margin-left:200px;padding:20px 18px}
  .g4{grid-template-columns:1fr 1fr}
  .adm-grid{grid-template-columns:1fr 1fr}
  .chart-grid-3{grid-template-columns:1fr}
  .g2i{grid-template-columns:1fr 1fr}
  .page-hdr .btn{font-size:11px;padding:6px 12px}
}

/* Tambahan: swipe hint untuk tabel di mobile */
@media(max-width:768px){
  .tw-wrap::after{content:'← geser untuk lihat lebih →';display:block;text-align:center;font-size:10px;color:var(--text3);padding:5px;background:var(--bg3)}
  /* Level row di Manajemen Atasan */
  .level-row{flex-wrap:wrap;gap:7px}
  /* Dept block head */
  .dept-block-head{flex-direction:column;align-items:flex-start;gap:7px}
  /* Upload area padding lebih kecil */
  .upload-area{padding:22px 16px}
  /* Date row */
  .date-row{flex-direction:column;gap:5px}
  .date-row input{flex:none;width:100%}
}

.adm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
@media(max-width:1100px){.adm-grid{grid-template-columns:1fr 1fr}}
.adm-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;position:relative;overflow:hidden}
.adm-stat::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.adm-stat.s-blue::after{background:var(--accent2)}.adm-stat.s-green::after{background:var(--green)}
.adm-stat.s-yellow::after{background:var(--yellow)}.adm-stat.s-red::after{background:var(--red)}
.adm-stat-ico{font-size:22px;margin-bottom:8px}
.adm-stat-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;line-height:1}
.adm-stat-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
.adm-stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-grid-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:1100px){.chart-grid,.chart-grid-3{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--text2);margin-bottom:16px}
.chart-wrap{position:relative;width:100%}
.alert-list{display:flex;flex-direction:column;gap:7px}
.alert-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg3);border-radius:var(--r);font-size:12px;border-left:3px solid transparent}
.alert-row.al-red{border-color:var(--red)}.alert-row.al-yellow{border-color:var(--yellow)}
.alert-name{font-weight:500;margin-bottom:1px}.alert-dept{color:var(--text2);font-size:11px}
/* USER MANAGEMENT */
.user-role-admin{background:rgba(45,91,227,.15);color:var(--accent2);border:1px solid rgba(45,91,227,.3)}
.user-role-staff{background:rgba(34,197,94,.12);color:var(--green);border:1px solid var(--green-b)}
</style>
</head>

</div>

/* ══════════════════════════════════════════════
   ESS v6 — API CLIENT LAYER
   Semua data dari Supabase via Vercel API Routes
   In-memory cache: tidak ada localStorage
   ══════════════════════════════════════════════ */

// In-memory store — menggantikan localStorage
const _store = {};

// G / S tetap synchronous (agar tidak perlu rewrite semua logic)
// Data di-load ke _store saat login, lalu setiap write langsung ke API + update _store
const G = (k, d) => { const v = _store[k]; return v == null ? d : v; };
const S = (k, v) => { _store[k] = v; };

// ── API helpers ─────────────────────────────────
async function api(method, path, body) {
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch('/api/' + path, opts);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'API error');
    return data;
  } catch (e) {
    console.error('API error:', path, e.message);
    throw e;
  }
}

// ── Load semua data ke in-memory store setelah login ──
async function loadAllData() {
  try {
    // Load semua data paralel dari Supabase
    const [emps, depts, sups, leaves, biglog, sysusers] = await Promise.all([
      api('GET', 'employees'),
      api('GET', 'departments'),
      api('GET', 'supervisors'),
      api('GET', 'leaves?all=1'),
      api('GET', 'biglog?all=1'),
      api('GET', 'sysusers'),
    ]);

    // Normalize dan simpan ke in-memory store
    S('ess5_emps', (emps || []).map(normalizeEmp));
    S('ess5_depts', depts || []);
    S('ess5_sups', (sups || []).map(normalizeSup));
    S('ess5_leaves', (leaves || []).map(normalizeLeave));
    S('ess5_biglog', (biglog || []).map(normalizeBiglog));
    S('ess5_sysusers', sysusers || []);
    S('ess5_yearshift', new Date().getFullYear());
    S('ess5_sel_emps', []);
    S('ess5_users', []);

    // Load notifikasi untuk user yang login
    if(CU && CU.nik) {
      try {
        const notifs = await api('GET', `notifications?nik=${CU.nik}`);
        S('ess5_notifs', (notifs || []).map(normalizeNotif));
      } catch(e) { S('ess5_notifs', []); }
    } else {
      S('ess5_notifs', []);
    }

    // Load kalender tahun berjalan + tahun depan
    const year = new Date().getFullYear();
    const calStore = {};
    try {
      const cal = await api('GET', `calendar?year=${year}`);
      calStore[String(year)] = Object.entries(cal || {}).map(([date, description]) => ({ date, description }));
    } catch(e) { calStore[String(year)] = []; }
    try {
      const calNext = await api('GET', `calendar?year=${year + 1}`);
      calStore[String(year + 1)] = Object.entries(calNext || {}).map(([date, description]) => ({ date, description }));
    } catch(e) { calStore[String(year + 1)] = []; }
    S('ess5_calendar', calStore);

    console.log('✓ Data loaded:', {
      emps: G('ess5_emps',[]).length,
      depts: G('ess5_depts',[]).length,
      leaves: G('ess5_leaves',[]).length,
      sups: G('ess5_sups',[]).length
    });
  } catch (e) {
    toast('⚠ Gagal memuat data: ' + e.message);
    console.error('loadAllData error:', e);
  }
}

// ── Normalizers: snake_case (DB) → camelCase (frontend) ──
function normalizeEmp(e) {
  return {
    nik: e.nik, name: e.name, dept: e.dept,
    status: e.status, joinDate: e.join_date,
    permanentDate: e.permanent_date,
    annY1: e.ann_y1 || 0, annY2: e.ann_y2 || 0, annY3: e.ann_y3 || 0,
    bigLeave: e.big_leave || 0, role: 'employee',
    username: e.username || e.emp_users?.username || ''
  };
}
function normalizeSup(s) {
  return {
    id: s.id, nik: s.nik, dept: s.dept,
    level: s.level, position: s.position, name: s.name
  };
}
function normalizeLeave(l) {
  return {
    id: l.id, empNik: l.emp_nik, leaveType: l.leave_type,
    dates: l.dates || [], reason: l.reason,
    status: l.status,
    approver1Nik: l.approver1_nik, approver1Name: l.approver1_name, approver1Pos: l.approver1_pos,
    approved1At: l.approved1_at, rejected1At: l.rejected1_at, reject1Reason: l.reject1_reason,
    approver2Nik: l.approver2_nik, approver2Name: l.approver2_name, approver2Pos: l.approver2_pos,
    approved2At: l.approved2_at, rejected2At: l.rejected2_at, reject2Reason: l.reject2_reason,
    appliedAt: l.applied_at, cancelledAt: l.cancelled_at, cancelReason: l.cancel_reason,
  };
}
function normalizeNotif(n) {
  return {
    id: n.id, targetNik: n.target_nik, title: n.title,
    body: n.body, leaveId: n.leave_id, read: n.is_read,
    createdAt: n.created_at
  };
}
function normalizeBiglog(b) {
  return {
    id: b.id, empNik: b.emp_nik, type: b.type,
    amount: b.amount, note: b.note, date: b.log_date || b.created_at
  };
}

// ── API Write Helpers (dipanggil setelah S() untuk sync ke DB) ──

// Employees
async function apiUpdateEmp(nik, fields) {
  // Convert camelCase → snake_case
  const dbFields = {};
  if (fields.annY1 !== undefined) dbFields.ann_y1 = fields.annY1;
  if (fields.annY2 !== undefined) dbFields.ann_y2 = fields.annY2;
  if (fields.annY3 !== undefined) dbFields.ann_y3 = fields.annY3;
  if (fields.bigLeave !== undefined) dbFields.big_leave = fields.bigLeave;
  if (fields.name !== undefined) dbFields.name = fields.name;
  if (fields.dept !== undefined) dbFields.dept = fields.dept;
  if (fields.status !== undefined) dbFields.status = fields.status;
  if (fields.joinDate !== undefined) dbFields.join_date = fields.joinDate;
  if (fields.permanentDate !== undefined) dbFields.permanent_date = fields.permanentDate;
  if (Object.keys(dbFields).length === 0) return;
  try {
    await api('PUT', 'employees', { nik, ...dbFields });
  } catch (e) { console.error('apiUpdateEmp', e); }
}

// Leaves
async function apiUpdateLeave(id, updateData) {
  try {
    await api('PUT', 'leaves', { id, ...updateData });
  } catch (e) { console.error('apiUpdateLeave', e); }
}

// Notifications
async function apiPushNotif(targetNik, title, body, leaveId) {
  try {
    await api('POST', 'notifications', { target_nik: targetNik, title, body, leave_id: leaveId });
  } catch (e) { console.error('apiPushNotif', e); }
}

/* CALENDAR */
const DEF_HOL={'2025':['2025-01-01','2025-03-28','2025-03-29','2025-03-30','2025-03-31','2025-04-01','2025-04-18','2025-05-01','2025-05-12','2025-05-29','2025-06-01','2025-08-17','2025-12-25','2025-12-26'],'2026':['2026-01-01','2026-03-03','2026-03-20','2026-03-21','2026-04-02','2026-04-03','2026-05-01','2026-05-14','2026-05-25','2026-06-01','2026-08-17','2026-12-25']};
function getHolSet(year){const cal=G('ess5_calendar',{});const custom=(cal[year]||[]).map(h=>h.date);const def=DEF_HOL[String(year)]||[];return new Set([...def,...custom])}
function isWorkday(ds){const d=new Date(ds+' 12:00:00');if(d.getDay()===0||d.getDay()===6)return false;return !getHolSet(ds.slice(0,4)).has(ds)}
function countWorkdays(dates){return(dates||[]).filter(d=>isWorkday(d)).length}
function leaveGapWD(appliedAt,dates){
  if(!dates||!dates.length)return 0;
  const start=new Date(appliedAt),end=new Date(dates[0]+' 12:00:00');
  let n=0;const c=new Date(start);
  while(c<end){const ds=c.toISOString().split('T')[0];if(isWorkday(ds))n++;c.setDate(c.getDate()+1)}
  return n;
}
function leaveCategory(l){const gap=leaveGapWD(l.appliedAt,l.dates);return gap>=6?{lbl:'Cuti Terencana',cls:'b-planned'}:{lbl:'Potong Cuti',cls:'b-deduct'}}
function getCalStatus(){
  const now=new Date();const y=now.getFullYear();const m=now.getMonth();const ny=y+1;const cal=G('ess5_calendar',{});
  if(m>=10&&!cal[ny])return{cls:'cal-warn',txt:`⚠ Kalender ${ny} belum diinput`};
  if(m===0&&!cal[y])return{cls:'cal-err',txt:`🔴 Kalender ${y} belum diinput!`};
  return{cls:'cal-ok',txt:`🟢 Kalender ${y} aktif`};
}

/* SALDO */
function totalAnn(e){return(e.annY1||0)+(e.annY2||0)+(e.annY3||0)}
function totalBig(e){return e.bigLeave||0}
function deductAnn(emp,days){
  const e={...emp};let r=days;
  const f3=Math.min(e.annY3||0,r);e.annY3-=f3;r-=f3;
  const f2=Math.min(e.annY2||0,r);e.annY2-=f2;r-=f2;
  const f1=Math.min(e.annY1||0,r);e.annY1-=f1;return e;
}
function restoreAnn(emp,days){return{...emp,annY1:(emp.annY1||0)+days}}

/* BIG LEAVE
   Aturan:
   - Akrual: permanentDate + 5*cycle tahun + 1 bulan, TAPI minimum mulai 2027-01-01
   - Expiry: 3 tahun dari bulan akrual (bulan sama, tanpa +1 bln)
   - Warning: H-1 bulan sebelum expiry (bulan yang sama dengan permanentDate, 3thn sebelum hangus)
*/
const BIG_LEAVE_START = new Date('2027-01-01'); // Akrual baru aktif mulai tahun ini

function bigAccrualDate(pd,cycle){
  const d=new Date(pd+' 12:00:00');
  const raw=new Date(d.getFullYear()+(5*cycle),d.getMonth()+1,1);
  // Kalau hasil perhitungan lebih awal dari START_YEAR, geser ke START_YEAR
  return raw < BIG_LEAVE_START ? new Date(BIG_LEAVE_START) : raw;
}

function bigExpiryDate(ad){
  // Hangus 3 tahun dari bulan akrual, bulan yang SAMA (tidak +1 bulan)
  return new Date(ad.getFullYear()+3, ad.getMonth(), 1);
}

function bigWarningDate(exp){
  // Warning H-1 bulan sebelum expiry
  return new Date(exp.getFullYear(), exp.getMonth()-1, 1);
}

// Track accrual/expiry checks per session (in-memory, tidak perlu persist)
const _sessionFlags={};
function sfGet(k){return _sessionFlags[k]||false}
function sfSet(k){_sessionFlags[k]=true}

function checkBigLeaveAccrual(){
  const now=new Date();const emps=G('ess5_emps',[]);let changed=false;
  emps.forEach((e,i)=>{
    if(!e.permanentDate||e.status!=='tetap')return;
    for(let c=1;c<=20;c++){
      const ad=bigAccrualDate(e.permanentDate,c);if(ad>now)break;
      const key=`bac_${e.nik}_c${c}`;if(sfGet(key))continue;
      // Cek apakah sudah pernah log di biglog (dari DB)
      const alreadyLogged=G('ess5_biglog',[]).some(l=>l.empNik===e.nik&&l.type==='accrual'&&l.note&&l.note.includes(`siklus ke-${c}`));
      if(alreadyLogged){sfSet(key);continue;}
      emps[i].bigLeave=(emps[i].bigLeave||0)+6;
      G('ess5_biglog',[]).unshift({empNik:e.nik,type:'accrual',date:ad.toISOString(),amount:6,note:`Akrual cuti besar siklus ke-${c}`});
      api('PUT','balance',{nik:e.nik,big_leave:emps[i].bigLeave}).catch(()=>{});
      api('POST','biglog',{emp_nik:e.nik,type:'accrual',amount:6,note:`Akrual cuti besar siklus ke-${c}`,log_date:ad.toISOString().split('T')[0]}).catch(()=>{});
      pushNotif(e.nik,'🎉 Cuti Besar Bertambah',`Saldo cuti besar Anda bertambah 6 hari — siklus ke-${c}.`,null);
      sfSet(key);changed=true;
    }
  });
  if(changed)S('ess5_emps',emps);
}

function checkBigLeaveExpiry(){
  const now=new Date();const emps=G('ess5_emps',[]);let changed=false;
  emps.forEach((e,i)=>{
    if(!e.permanentDate||e.status!=='tetap'||(e.bigLeave||0)===0)return;
    for(let c=1;c<=20;c++){
      const ad=bigAccrualDate(e.permanentDate,c);if(ad>now)break;
      const exp=bigExpiryDate(ad);
      if(now.getFullYear()===exp.getFullYear()&&now.getMonth()===exp.getMonth()){
        const key=`bexp_${e.nik}_c${c}_${exp.getFullYear()}`;
        const alreadyLogged=G('ess5_biglog',[]).some(l=>l.empNik===e.nik&&l.type==='expired');
        if(!sfGet(key)&&!alreadyLogged&&(emps[i].bigLeave||0)>0){
          const expired=emps[i].bigLeave;emps[i].bigLeave=0;
          api('PUT','balance',{nik:e.nik,big_leave:0}).catch(()=>{});
          api('POST','biglog',{emp_nik:e.nik,type:'expired',amount:expired,note:`${expired} hari saldo cuti besar hangus`}).catch(()=>{});
          sfSet(key);changed=true;
          pushNotif(e.nik,'⚠️ Cuti Besar Hangus',`${expired} hari saldo cuti besar hangus per ${exp.toLocaleDateString('id-ID',{month:'long',year:'numeric'})}.`,null);
          G('ess5_sysusers',[]).filter(u=>u.role==='admin').forEach(u=>{pushNotif(u.nik,'Info: Cuti Besar Hangus',`${e.name} (${e.nik}): ${expired} hari cuti besar hangus.`,null)});
        }
      }
    }
  });
  if(changed)S('ess5_emps',emps);
}

function checkBigLeaveWarning(){
  const now=new Date();const emps=G('ess5_emps',[]);
  emps.forEach(e=>{
    if(!e.permanentDate||e.status!=='tetap'||(e.bigLeave||0)===0)return;
    for(let c=1;c<=20;c++){
      const ad=bigAccrualDate(e.permanentDate,c);if(ad>now)break;
      const exp=bigExpiryDate(ad);const warn=bigWarningDate(exp);
      if(now.getFullYear()===warn.getFullYear()&&now.getMonth()===warn.getMonth()){
        const key=`bwarn_${e.nik}_c${c}_${warn.getFullYear()}${warn.getMonth()}`;
        if(!sfGet(key)){
          api('POST','biglog',{emp_nik:e.nik,type:'notif',amount:e.bigLeave,note:`Peringatan 1 bulan sebelum hangus`}).catch(()=>{});
          sfSet(key);
          pushNotif(e.nik,'⚠️ Peringatan Cuti Besar',`${e.bigLeave} hari saldo cuti besar akan hangus bulan depan. Segera ajukan!`,null);
          G('ess5_sups',[]).filter(s=>s.dept===e.dept).forEach(s=>pushNotif(s.nik,'Peringatan Cuti Besar Bawahan',`${e.name}: ${e.bigLeave} hari cuti besar akan hangus bulan depan.`,null));
        }
      }
    }
  });
}

function checkDecWarnings(){
  const now=new Date();if(now.getMonth()!==11)return;
  const emps=G('ess5_emps',[]);
  emps.forEach(e=>{
    if((e.annY3||0)>0){const key=`decwarn_${e.nik}_${now.getFullYear()}`;if(!sfGet(key)){pushNotif(e.nik,'⚠️ Saldo Cuti Akan Hangus',`${e.annY3} hari saldo Y3 Anda akan hangus 31 Desember ${now.getFullYear()}. Segera ajukan!`,null);sfSet(key)}}
  });
}

function checkCalReminder(){
  const now=new Date();if(now.getMonth()<10)return;
  const ny=now.getFullYear()+1;
  const cal=G('ess5_calendar',{});if(cal[String(ny)]!==undefined&&cal[String(ny)].length>0)return;
  const key=`calrem_${ny}_m${now.getMonth()}`;if(sfGet(key))return;
  G('ess5_sysusers',[]).filter(u=>u.role==='admin').forEach(u=>{
    pushNotif(u.nik,'📅 Kalender Kerja Belum Diinput',`Kalender kerja tahun ${ny} belum diinput. Segera upload setelah perundingan serikat pekerja selesai.`,null);
  });
  sfSet(key);
}

function yearShift(){
  // Year shift dijalankan server-side atau via bulk update manual
  // Di sini hanya update in-memory untuk display
  const now=new Date();const cy=now.getFullYear();const last=G('ess5_yearshift',cy-1);
  if(cy<=last)return;
  S('ess5_yearshift',cy);
}

function autoUser(name,used){
  const parts=name.toLowerCase().replace(/[^a-z\s]/g,'').trim().split(/\s+/);
  for(let i=0;i<parts.length;i++) if(parts[i]&&!used.includes(parts[i]))return parts[i];
  return(parts[0]||'user')+(Math.random()*900+100|0);
}

/* AUTH */
let CU=null,CE=null;
// CU = user auth record, CE = employee profile (null for admin/staff)
// isSysUser() = true when logged in as admin or staff (no employee record)
function isSysUser(){return CU&&(CU.role==='admin'||CU.role==='staff')}

async function doLogin(){
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  const btn=document.querySelector('.btn-primary');
  if(btn){btn.textContent='Memuat...';btn.disabled=true;}
  try {
    const result = await api('POST','auth',{username:u,password:p});
    CU = result.user;
    CE = result.employee ? normalizeEmp(result.employee) : null;
    if(result.type==='sysuser') {
      // Simpan ke store agar isSysUser() bisa bekerja sebelum loadAllData
      S('ess5_sysusers',[CU]);
    }
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('sb-img').src=LOGO;
    // Load semua data dari Supabase
    await loadAllData();
    // Setelah load, refresh CE dengan data terbaru
    if(CE) CE=G('ess5_emps',[]).find(e=>e.nik===CU.nik)||CE;
    yearShift();
    if(!isSysUser()){checkBigLeaveAccrual();checkBigLeaveExpiry();checkBigLeaveWarning();checkDecWarnings();}
    checkCalReminder();
    buildApp();
    if(window._ar)clearInterval(window._ar);
    window._ar=setInterval(async()=>{
      if(!isSysUser()&&CE){
        CE=G('ess5_emps',[]).find(e=>e.nik===CU.nik)||CE;
        checkBigLeaveAccrual();checkBigLeaveExpiry();checkBigLeaveWarning();
      }
      const active=document.querySelector('.page.active');
      if(active)refreshPage(active.id.replace('page-',''));
      refreshBadge();
    },60000);
  } catch(e) {
    document.getElementById('lerr').textContent = e.message || 'Username atau password salah';
    document.getElementById('lerr').style.display='block';
  } finally {
    if(btn){btn.textContent='Masuk';btn.disabled=false;}
  }
}
function doLogout(){
  if(window._ar)clearInterval(window._ar);
  CU=null;CE=null;
  // Clear in-memory store
  for(const k in _store) delete _store[k];
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lu').value='';document.getElementById('lp').value='';
  document.getElementById('lerr').style.display='none';
}

/* NOTIFICATIONS — push ke API + update in-memory */
function pushNotif(targetNik,title,body,leaveId){
  const notifs=G('ess5_notifs',[]);
  const newNotif={id:'n_'+Date.now()+'_'+Math.random().toString(36).slice(2),targetNik,title,body,leaveId,read:false,at:new Date().toISOString()};
  notifs.unshift(newNotif);
  S('ess5_notifs',notifs);
  if(CE&&CE.nik===targetNik)refreshBadge();
  // Async write ke API (fire-and-forget, UI tidak menunggu)
  apiPushNotif(targetNik,title,body||'',leaveId).catch(e=>console.warn('notif push failed',e));
}
function refreshBadge(){
  if(!CE&&!isSysUser())return;
  if(!isSysUser()){
    const isSup=G('ess5_sups',[]).some(s=>s.nik===CE.nik);
    if(isSup){document.getElementById('bell').style.display='flex'}
    const unread=G('ess5_notifs',[]).filter(n=>n.targetNik===CE.nik&&!n.read).length;
    const dot=document.getElementById('bell-dot');if(dot)dot.classList.toggle('show',unread>0);
    const badge=document.getElementById('approval-badge');
    if(badge){const cnt=getPendingApprovals().length;badge.textContent=cnt;badge.classList.toggle('show',cnt>0)}
  }
  // Calendar indicator — employee admin role no longer exists, this is handled per-context
}
function toggleNotif(){const p=document.getElementById('notif-popup');p.classList.toggle('show');if(p.classList.contains('show'))renderNotifList()}
function renderNotifList(){
  const notifs=G('ess5_notifs',[]).filter(n=>n.targetNik===CE.nik);
  const el=document.getElementById('notif-list');
  if(!notifs.length){el.innerHTML='<div class="notif-empty">Tidak ada notifikasi</div>';return}
  el.innerHTML=notifs.map(n=>`<div class="notif-item ${n.read?'':'unread'}" onclick="readNotif('${n.id}')">
    <div class="notif-item-title">${n.title}</div>
    <div style="color:var(--text2);font-size:12px">${n.body}</div>
    <div class="notif-time">${fmtDate(n.at)}</div>
  </div>`).join('');
}
function readNotif(id){
  const n=G('ess5_notifs',[]);const i=n.findIndex(x=>x.id===id);
  if(i>=0){n[i].read=true;S('ess5_notifs',n)}
  refreshBadge();renderNotifList();
  // Sync ke DB (id dari DB adalah numeric, dari in-memory bisa string)
  api('PUT','notifications',{id}).catch(()=>{});
}
function clearNotifs(){
  const n=G('ess5_notifs',[]).map(x=>x.targetNik===CU.nik?{...x,read:true}:x);
  S('ess5_notifs',n);refreshBadge();renderNotifList();
  api('PUT','notifications',{nik:CU.nik}).catch(()=>{});
}

/* APP SHELL */
function buildApp(){
  const sysU=isSysUser();
  const isAdmin=CU.role==='admin';
  const isStaff=CU.role==='staff';
  const sups=G('ess5_sups',[]);
  const isSup=!sysU&&CE&&sups.some(s=>s.nik===CE.nik);

  // Sidebar info
  if(sysU){
    document.getElementById('sb-name').textContent=CU.name||CU.username;
    document.getElementById('sb-nik').textContent='ID: '+CU.nik;
    document.getElementById('sb-role').textContent=(isAdmin?'Administrator':'Staff Admin')+' · Sistem';
  } else {
    document.getElementById('sb-name').textContent=CE.name;
    document.getElementById('sb-nik').textContent='NIK: '+CE.nik;
    document.getElementById('sb-role').textContent=(isSup?'Atasan/Karyawan':'Karyawan')+' · '+CE.dept;
  }

  // Bell only for supervisors & employees (not sys users)
  if(!sysU&&(isSup)){document.getElementById('bell').style.display='flex';refreshBadge()}
  else {document.getElementById('bell').style.display='none'}

  let nav='';
  const cy=new Date().getFullYear();
  const opts=[0,1,2,3].map((i)=>`<option value="${cy+i-1}">${cy+i-1}</option>`).join('');

  if(sysU){
    // Admin/Staff: hanya menu sistem, tidak ada cuti pribadi
    nav=`<div class="nav-sec">Dashboard</div>`+NI('adm-dashboard','Dashboard','home');
    nav+=`<div class="nav-sec">Manajemen Cuti</div>`+NI('admin-leaves','Semua Pengajuan','clip')+NI('admin-balance','Saldo Cuti','wallet')+NI('admin-bulk','Update Masal','ref')+NI('admin-biglog','Log Cuti Besar','log');
    nav+=`<div class="nav-sec">Manajemen Data</div>`+NI('admin-sup','Manajemen Atasan','uc')+NI('admin-emp','Manajemen Karyawan','id')+NI('admin-dept','Manajemen Departemen','bldg')+NI('admin-calendar','Kalender Kerja','calicon')+NI('admin-upload','Upload Data','up');
    if(isAdmin)nav+=`<div class="nav-sec">Sistem</div>`+NI('admin-sysuser','Manajemen User','id')+NI('changepass','Ubah Password','key');
    else nav+=`<div class="nav-sec">Akun</div>`+NI('changepass','Ubah Password','key');

    document.getElementById('nav-menu').innerHTML=nav;
    document.getElementById('main-content').innerHTML=[
      pgAdmDashboard(),
      pgAdminLeaves(),pgAdminBalance(),pgAdminBulk(),pgAdminBigLog(),
      pgAdminSup(),pgAdminEmp(),pgAdminDept(),pgAdminCalendar(opts),pgAdminUpload(),
      isAdmin?pgAdminSysUser():'',
      pgChangePass()
    ].join('');
    showPage('adm-dashboard');

  } else {
    // Employee / Supervisor
    nav='<div class="nav-sec">Utama</div>'+NI('dashboard','Dashboard','home')+NI('leave','Cuti Saya','cal')+NI('changepass','Ubah Password','key');

    document.getElementById('nav-menu').innerHTML=nav;
    document.getElementById('main-content').innerHTML=[
      pgDash(),pgLeave(),pgChangePass(),
      isSup?pgApproval():'',
      isSup?pgTeamLeave():'',
      isSup?pgSupLeaveLog():''
    ].join('');
    showPage('dashboard');
  }
}

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  if(window.innerWidth<=768)closeSidebar();
}

    'admin-calendar':renderAdminCalendar,'admin-biglog':renderAdminBigLog,
    'admin-sysuser':renderAdminSysUser,

}

/* ══ RENDER ADMIN SYSTEM DASHBOARD ══ */
let _admCharts={};
function destroyChart(id){if(_admCharts[id]){_admCharts[id].destroy();delete _admCharts[id]}}

function renderAdmDashboard(){
  const now=new Date();
  document.getElementById('adm-dash-sub').textContent=now.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const emps=G('ess5_emps',[]);
  const leaves=G('ess5_leaves',[]);
  const sysUsers=G('ess5_sysusers',[]);

  // Calendar status banner
  const calS=getCalStatus();
  const ci=document.getElementById('adm-cal-indicator');
  if(ci){
    const nextY=now.getFullYear()+1;
    const cal=G('ess5_calendar',{});
    if((now.getMonth()>=10)&&!cal[nextY])
      ci.innerHTML=`<div class="cal-status cal-warn" onclick="showPage('admin-calendar')">⚠ Kalender ${nextY} belum diinput</div>`;
    else ci.innerHTML=`<div class="cal-status cal-ok">${calS.txt}</div>`;
  }

  // — Stat Cards —
  const totalEmp=emps.length;
  const totalPending=leaves.filter(l=>l.status==='pending').length;
  const totalY3Risk=emps.filter(e=>(e.annY3||0)>0).length;
  const totalBigRisk=(()=>{
    const n=new Date();
    return emps.filter(e=>{
      if(!e.permanentDate||e.status!=='tetap'||(e.bigLeave||0)===0)return false;
      for(let c=1;c<=20;c++){
        const ad=bigAccrualDate(e.permanentDate,c);if(ad>n)break;
        const exp=bigExpiryDate(ad);
        const diff=(exp-n)/(86400000*30);
        if(diff>=0&&diff<=2)return true;
      }
      return false;
    }).length;
  })();

  document.getElementById('adm-stats').innerHTML=`
    <div class="adm-stat s-blue">
      <div class="adm-stat-ico">👥</div>
      <div class="adm-stat-val c-blue">${totalEmp}</div>
      <div class="adm-stat-lbl">Total Karyawan</div>
      <div class="adm-stat-sub">${emps.filter(e=>e.status==='tetap').length} tetap · ${emps.filter(e=>e.status==='kontrak').length} kontrak</div>
    </div>
    <div class="adm-stat s-yellow">
      <div class="adm-stat-ico">⏳</div>
      <div class="adm-stat-val c-yellow">${totalPending}</div>
      <div class="adm-stat-lbl">Pengajuan Pending</div>
      <div class="adm-stat-sub">${leaves.filter(l=>l.status==='approved').length} disetujui bulan ini</div>
    </div>
    <div class="adm-stat s-red">
      <div class="adm-stat-ico">⚠️</div>
      <div class="adm-stat-val c-red">${totalY3Risk}</div>
      <div class="adm-stat-lbl">Karyawan Saldo Y3</div>
      <div class="adm-stat-sub">Saldo hangus akhir tahun</div>
    </div>
    <div class="adm-stat s-green">
      <div class="adm-stat-ico">🔔</div>
      <div class="adm-stat-val c-orange">${totalBigRisk}</div>
      <div class="adm-stat-lbl">Cuti Besar Akan Hangus</div>
      <div class="adm-stat-sub">Dalam 2 bulan ke depan</div>
    </div>`;

  // — Chart Row 1: Leave per Month (bar) + Status Distribution (donut) —
  const curYear=now.getFullYear();
  const monthLabels=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const monthData=Array(12).fill(0);
  const monthDataApproved=Array(12).fill(0);
  leaves.forEach(l=>{
    const d=new Date(l.appliedAt);
    if(d.getFullYear()===curYear){
      monthData[d.getMonth()]++;
      if(l.status==='approved')monthDataApproved[d.getMonth()]++;
    }
  });
  const statusCounts={pending:0,approved:0,rejected:0,cancelled:0};
  leaves.forEach(l=>{if(statusCounts[l.status]!==undefined)statusCounts[l.status]++});

  document.getElementById('adm-chart-row1').innerHTML=`
    <div class="chart-card">
      <div class="chart-title">Pengajuan Cuti per Bulan</div>
      <div class="chart-sub">Tahun ${curYear} — total vs disetujui</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-monthly"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Status Pengajuan</div>
      <div class="chart-sub">Distribusi semua pengajuan</div>
      <div class="chart-wrap" style="height:220px;display:flex;align-items:center;justify-content:center"><canvas id="chart-status" style="max-height:200px"></canvas></div>
    </div>`;

  // — Chart Row 2: Dept Headcount + Dept Leave Balance —
  const depts=G('ess5_depts',[]);
  const deptHeadcount=depts.map(d=>emps.filter(e=>e.dept===d).length);
  const deptAvgAnn=depts.map(d=>{
    const de=emps.filter(e=>e.dept===d);
    if(!de.length)return 0;
    return Math.round(de.reduce((s,e)=>s+totalAnn(e),0)/de.length*10)/10;
  });
  const deptY3=depts.map(d=>emps.filter(e=>e.dept===d&&(e.annY3||0)>0).length);

  document.getElementById('adm-chart-row2').innerHTML=`
    <div class="chart-card">
      <div class="chart-title">Headcount per Departemen</div>
      <div class="chart-sub">Jumlah karyawan aktif</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-headcount"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Rata-rata Saldo Cuti Tahunan per Dept</div>
      <div class="chart-sub">Rata-rata total ann (Y1+Y2+Y3) per departemen</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-dept-ann"></canvas></div>
    </div>`;

  // — Chart Row 3: Y3 Risk List + Big Leave Risk List —
  const y3Emp=emps.filter(e=>(e.annY3||0)>0).sort((a,b)=>(b.annY3||0)-(a.annY3||0)).slice(0,6);
  const bigRiskEmp=(()=>{
    const n=new Date();
    return emps.filter(e=>{
      if(!e.permanentDate||e.status!=='tetap'||(e.bigLeave||0)===0)return false;
      for(let c=1;c<=20;c++){
        const ad=bigAccrualDate(e.permanentDate,c);if(ad>n)break;
        const exp=bigExpiryDate(ad);
        const diff=(exp-n)/(86400000*30);
        if(diff>=0&&diff<=3)return true;
      }
      return false;
    }).slice(0,6);
  })();

  document.getElementById('adm-chart-row3').innerHTML=`
    <div class="chart-card">
      <div class="chart-title">⚠️ Saldo Y3 — Akan Hangus Akhir Tahun</div>
      <div class="chart-sub">${y3Emp.length} karyawan dengan saldo Y3 aktif</div>
      <div class="alert-list">${y3Emp.length?y3Emp.map(e=>`
        <div class="alert-row al-red">
          <div><div class="alert-name">${e.name}</div><div class="alert-dept">${e.dept} · NIK ${e.nik}</div></div>
          <span class="badge b-rejected"><b>${e.annY3}</b> hr Y3</span>
        </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">✅ Tidak ada saldo Y3 berisiko</div>`}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🔔 Cuti Besar — Akan Hangus ≤3 Bulan</div>
      <div class="chart-sub">${bigRiskEmp.length} karyawan perlu segera ajukan cuti besar</div>
      <div class="alert-list">${bigRiskEmp.length?bigRiskEmp.map(e=>`
        <div class="alert-row al-yellow">
          <div><div class="alert-name">${e.name}</div><div class="alert-dept">${e.dept} · NIK ${e.nik}</div></div>
          <span class="badge b-pending"><b>${e.bigLeave}</b> hr</span>
        </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">✅ Tidak ada cuti besar berisiko</div>`}</div>
    </div>`;

  // Render charts after DOM update
  requestAnimationFrame(()=>{
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const gridColor=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
    const textColor=isDark?'#9090a8':'#5a6070';
    Chart.defaults.color=textColor;Chart.defaults.font.family='DM Sans';Chart.defaults.font.size=11;

    // Monthly bar chart
    destroyChart('monthly');
    const mc=document.getElementById('chart-monthly');
    if(mc)_admCharts['monthly']=new Chart(mc,{type:'bar',data:{labels:monthLabels,datasets:[
      {label:'Total Pengajuan',data:monthData,backgroundColor:'rgba(45,91,227,.55)',borderRadius:4,borderSkipped:false},
      {label:'Disetujui',data:monthDataApproved,backgroundColor:'rgba(34,197,94,.55)',borderRadius:4,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,padding:12}}},scales:{x:{grid:{color:gridColor}},y:{grid:{color:gridColor},ticks:{stepSize:1,precision:0}}}}});

    // Status donut
    destroyChart('status');
    const sc=document.getElementById('chart-status');
    if(sc)_admCharts['status']=new Chart(sc,{type:'doughnut',data:{
      labels:['Pending','Disetujui','Ditolak','Dibatalkan'],
      datasets:[{data:[statusCounts.pending,statusCounts.approved,statusCounts.rejected,statusCounts.cancelled],
        backgroundColor:['#f59e0b','#22c55e','#ef4444','#6b7280'],borderWidth:0,hoverOffset:6}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{boxWidth:10,padding:10}}}}});

    // Headcount horizontal bar
    destroyChart('headcount');
    const hc=document.getElementById('chart-headcount');
    if(hc)_admCharts['headcount']=new Chart(hc,{type:'bar',data:{
      labels:depts,datasets:[{label:'Karyawan',data:deptHeadcount,backgroundColor:'rgba(45,91,227,.6)',borderRadius:4,borderSkipped:false}]
    },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gridColor},ticks:{stepSize:1,precision:0}},y:{grid:{color:gridColor}}}}});

    // Dept avg annual leave bar
    destroyChart('dept-ann');
    const da=document.getElementById('chart-dept-ann');
    if(da)_admCharts['dept-ann']=new Chart(da,{type:'bar',data:{
      labels:depts,datasets:[
        {label:'Rata-rata Saldo Ann',data:deptAvgAnn,backgroundColor:'rgba(59,130,246,.6)',borderRadius:4,borderSkipped:false},
        {label:'Punya Y3',data:deptY3,backgroundColor:'rgba(239,68,68,.5)',borderRadius:4,borderSkipped:false,type:'bar'}
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,padding:10}}},scales:{x:{grid:{color:gridColor}},y:{grid:{color:gridColor}}}}});
  });
}

function lcHTML(l,showActions){
  const sbMap={pending:'b-pending',approved:'b-approved',rejected:'b-rejected',cancelled:'b-cancelled'};
  const slMap={pending:'Menunggu',approved:'Disetujui',rejected:'Ditolak',cancelled:'Dibatalkan'};
  const cat=leaveCategory(l);const wdays=countWorkdays(l.dates||[]);
  const canCancel=showActions&&(l.status==='pending'||l.status==='approved');
  return `<div class="lc">
    <div class="lc-hdr">
      <div>
        <div class="lc-title">${l.leaveType} — ${wdays} hari kerja <span style="color:var(--text2);font-size:12px">(${(l.dates||[]).length} kalender)</span></div>
        <div class="lc-meta"><span>📅 ${formatDates(l.dates)}</span><span>Atasan: ${l.supervisorName}</span></div>
      </div>
      <span class="badge ${sbMap[l.status]||'b-pending'}">${slMap[l.status]||l.status}</span>
    </div>
    <div class="lc-reason">${l.reason}</div>
    ${apStepsHTML(l)}
    <div class="lc-foot">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge ${cat.cls}">${cat.lbl}</span>
        <span class="badge b-neutral">Ajuan: ${fmtDate(l.appliedAt)}</span>
        ${l.processedAt?`<span class="badge b-neutral">Diproses: ${fmtDate(l.processedAt)}</span>`:''}
      </div>
      ${canCancel?`<button class="btn btn-sm btn-orange" onclick="openCancelLeave('${l.id}')">Batalkan</button>`:''}
    </div>
    ${l.note?`<div style="margin-top:7px;font-size:12px;padding:6px 12px;background:var(--bg3);border-radius:8px;color:var(--text2)">Catatan: ${l.note}</div>`:''}
    ${l.cancelReason?`<div style="margin-top:5px;font-size:12px;padding:6px 12px;background:var(--orange-bg);border-radius:8px;color:var(--orange)">Alasan Batal: ${l.cancelReason}</div>`:''}
  </div>`;
}

function apStepsHTML(l){
  const sups=G('ess5_sups',[]);const emp=G('ess5_emps',[]).find(e=>e.nik===l.empNik)||{dept:''};
  const ds=sups.filter(s=>s.dept===emp.dept).sort((a,b)=>a.level-b.level);
  if(!ds.length) return '';
  let h='<div class="ap-steps">';
  ds.forEach((s,i)=>{
    if(i>0) h+='<span class="ap-arrow">→</span>';
    let cls='s-wait',lbl=`L${s.level}: ${s.name}`;
    if(l.status==='rejected'&&l.processedBy===s.nik) cls='s-rej',lbl+=' ✗';
    else if(l.approvals&&l.approvals.includes(s.nik)) cls='s-done',lbl+=' ✓';
    else if(l.status==='pending'&&(i===0||(l.approvals&&l.approvals.includes(ds[i-1].nik)))) cls='s-pending';
    h+=`<span class="ap-step ${cls}">${lbl}</span>`;
  });
  return h+'</div>';
}

function getPendingApprovals(){
  const sups=G('ess5_sups',[]);const emps=G('ess5_emps',[]);
  const myDepts=sups.filter(s=>s.nik===CE.nik).map(s=>s.dept);
  return G('ess5_leaves',[]).filter(l=>{
    if(l.status!=='pending') return false;
    const e=emps.find(x=>x.nik===l.empNik);
    if(!e||!myDepts.includes(e.dept)||l.empNik===CE.nik) return false;
    const ds=sups.filter(s=>s.dept===e.dept).sort((a,b)=>a.level-b.level);
    const mine=sups.find(s=>s.nik===CE.nik&&s.dept===e.dept);if(!mine) return false;
    if(mine.level===1) return !l.approvals||!l.approvals.some(a=>ds.find(s=>s.nik===a&&s.level===1));
    const lvl1=ds.find(s=>s.level===1);
    return lvl1&&l.approvals&&l.approvals.includes(lvl1.nik)&&!l.approvals.includes(CE.nik);
  });
}

let empFilters={};

function setQF(type){
  document.querySelectorAll('.qf-btn').forEach(b=>b.classList.remove('active'));
  if(type==='reset'){
    // Reset semua filter termasuk tanggal
    empFilters={};
    // Reset semua input di filter row
    document.querySelectorAll('.filter-row input').forEach(inp=>{inp.value=''});
    document.querySelectorAll('.filter-row select').forEach(sel=>{sel.selectedIndex=0});
  } else {
    empFilters._qf=type;
    const btn=document.getElementById('qf-'+type.replace('_expiring',''));
    if(btn) btn.classList.add('active');
  }
  renderAdminEmp();
}

function getFilteredEmps(){
  const emps=G('ess5_emps',[]);const users=G('ess5_users',[]);const now=new Date();
  return emps.filter(e=>{
    const u=users.find(x=>x.nik===e.nik)||{username:''};
    if(empFilters._qf==='y3'&&(e.annY3||0)===0) return false;
    if(empFilters._qf==='y2'&&(e.annY2||0)===0) return false;
    if(empFilters._qf==='big_expiring'){
      if(!e.permanentDate||e.status!=='tetap'||(e.bigLeave||0)===0) return false;
      let found=false;
      for(let c=1;c<=20;c++){
        const ad=bigAccrualDate(e.permanentDate,c);if(ad>now) break;
        const exp=bigExpiryDate(ad);
        const diff=(exp-now)/(86400000*30);
        if(diff>=0&&diff<=2){found=true;break}
      }
      if(!found) return false;
    }
    if(empFilters.nik&&!e.nik.toLowerCase().includes(empFilters.nik.toLowerCase())) return false;
    if(empFilters.name&&!e.name.toLowerCase().includes(empFilters.name.toLowerCase())) return false;
    if(empFilters.dept&&e.dept!==empFilters.dept) return false;
    if(empFilters.status&&e.status!==empFilters.status) return false;
    if(empFilters.username&&!u.username.toLowerCase().includes(empFilters.username.toLowerCase())) return false;
    for(const col of ['annY1','annY2','annY3','bigLeave']){
      const op=empFilters['op_'+col],val=empFilters['val_'+col];
      if(op&&val!==''&&val!==undefined){
        const ev=e[col]||0,vn=parseFloat(val);
        if(op==='>'&&!(ev>vn)) return false;
        if(op==='<'&&!(ev<vn)) return false;
        if(op==='='&&!(ev===vn)) return false;
        if(op==='>='&&!(ev>=vn)) return false;
        if(op==='<='&&!(ev<=vn)) return false;
      }
    }
    if(empFilters.permFrom&&e.permanentDate&&e.permanentDate<empFilters.permFrom) return false;
    if(empFilters.permTo&&e.permanentDate&&e.permanentDate>empFilters.permTo) return false;
    if(empFilters.joinFrom&&e.joinDate&&e.joinDate<empFilters.joinFrom) return false;
    if(empFilters.joinTo&&e.joinDate&&e.joinDate>empFilters.joinTo) return false;
    return true;
  });
}

function setEF(k,v){

  let focusKey=null,cursorPos=0;
  if(active&&active.dataset&&active.dataset.fkey){
    focusKey=active.dataset.fkey;
    cursorPos=active.selectionStart||0;
  }

    const el=document.querySelector(`[data-fkey="${focusKey}"]`);
    if(el){
      el.focus();

  }
}

    return `<div class="cal-month">
      <div class="cal-month-head">${mLabel} <span style="color:var(--text2);font-size:12px">${items.length} hari</span></div>

async function saveHoliday(year){
  const date=document.getElementById('hol-date').value;const type=document.getElementById('hol-type').value;const note=document.getElementById('hol-note').value.trim();
  if(!date)return toast('Pilih tanggal');
  const cal=G('ess5_calendar',{});if(!cal[String(year)]) cal[String(year)]=[];
  if(cal[String(year)].find(h=>h.date===date))return toast('Tanggal sudah ada');
  try {
    const holidays={};cal[String(year)].forEach(h=>{holidays[h.date]=h.note||h.type||''});
    holidays[date]=note||type;
    await api('POST','calendar',{year,holidays});
    cal[String(year)].push({date,type,note});S('ess5_calendar',cal);
    closeMo();toast('Hari libur ditambahkan ✓');renderAdminCalendar();refreshBadge();
  } catch(e){toast('Gagal: '+e.message);}
}

async function deleteHoliday(year,date){
  if(!confirm('Hapus hari libur ini?'))return;
  const cal=G('ess5_calendar',{});
  if(!cal[String(year)])return;
  try {
    const remaining={};
    cal[String(year)].filter(h=>h.date!==date).forEach(h=>{remaining[h.date]=h.note||h.type||''});
    await api('POST','calendar',{year,holidays:remaining});
    cal[String(year)]=cal[String(year)].filter(h=>h.date!==date);
    S('ess5_calendar',cal);toast('Dihapus');renderAdminCalendar();
  } catch(e){toast('Gagal: '+e.message);}
}

async function importHolidayCSV(inp){
  const f=inp.files[0];if(!f)return;
  const sel=document.getElementById('cal-year-sel');const year=sel?parseInt(sel.value):new Date().getFullYear();
  const r=new FileReader();
  r.onload=async ev=>{
    const cal=G('ess5_calendar',{});if(!cal[String(year)]) cal[String(year)]=[];
    const holidays={};cal[String(year)].forEach(h=>{holidays[h.date]=h.note||h.type||''});
    let added=0;
    ev.target.result.split('\n').filter(Boolean).forEach(line=>{
      const p=line.split(',').map(s=>s.trim().replace(/"/g,''));
      if(!p[0]||!p[0].match(/^\d{4}-\d{2}-\d{2}$/)) return;
      if(holidays[p[0]]) return;
      holidays[p[0]]=p[2]||p[1]||'';
      cal[String(year)].push({date:p[0],type:p[1]||'Cuti Bersama',note:p[2]||''});
      added++;
    });
    try {
      await api('POST','calendar',{year,holidays});
      S('ess5_calendar',cal);toast(`✓ ${added} hari libur ditambahkan`);renderAdminCalendar();refreshBadge();
    } catch(e){toast('Gagal: '+e.message);}
  };
  r.readAsText(f);
}

async function processAppr(lid,action){
  const note=document.getElementById('mo-note').value;
  const leaves=G('ess5_leaves',[]);const idx=leaves.findIndex(l=>l.id===lid);if(idx<0)return;
  const l=leaves[idx];if(!l.approvals)l.approvals=[];
  const sups=G('ess5_sups',[]);const emps=G('ess5_emps',[]);
  const e=emps.find(x=>x.nik===l.empNik)||{dept:''};
  const ds=sups.filter(s=>s.dept===e.dept).sort((a,b)=>a.level-b.level);
  const maxLvl=ds.length?Math.max(...ds.map(s=>s.level)):1;
  const myLvl=sups.find(s=>s.nik===CE.nik&&s.dept===e.dept)?.level||1;
  let apiAction,balUpdate=null;
  if(action==='reject'){
    apiAction=myLvl===1?'reject1':'reject2';
    l.status='rejected';l.note=note;l.processedAt=new Date().toISOString();l.processedBy=CE.nik;
    pushNotif(l.empNik,'Cuti Ditolak',`${l.leaveType} ${formatDates(l.dates)} ditolak oleh ${CE.name}. Catatan: ${note||'-'}`,l.id);
  } else {
    if(!l.approvals.includes(CE.nik))l.approvals.push(CE.nik);
    if(myLvl>=maxLvl){
      apiAction=myLvl===1?'approve1':'approve2';
      l.status='approved';l.note=note;l.processedAt=new Date().toISOString();l.processedBy=CE.nik;
      const ei=emps.findIndex(x=>x.nik===l.empNik);
      if(ei>=0){
        if(l.leaveType==='Cuti Tahunan'){emps[ei]=deductAnn(emps[ei],l.days);balUpdate={nik:emps[ei].nik,annY1:emps[ei].annY1,annY2:emps[ei].annY2,annY3:emps[ei].annY3};}
        else if(l.leaveType==='Cuti Besar'){
          emps[ei].bigLeave=Math.max(0,(emps[ei].bigLeave||0)-l.days);
          balUpdate={nik:emps[ei].nik,bigLeave:emps[ei].bigLeave};
          api('POST','biglog',{emp_nik:l.empNik,type:'used',amount:l.days,note:`Digunakan — pengajuan ${l.id.slice(0,12)}`}).catch(()=>{});
        }
        S('ess5_emps',emps);if(emps[ei].nik===CE.nik)CE=emps[ei];
      }
      pushNotif(l.empNik,'✅ Cuti Disetujui',`${l.leaveType} ${formatDates(l.dates)} disetujui sepenuhnya!`,l.id);
    } else {
      apiAction='approve1';
      l.note=note;const nextSup=ds.find(s=>s.level===myLvl+1);
      if(nextSup)pushNotif(nextSup.nik,'🔔 Perlu Approval Anda',`${e.name} mengajukan ${l.leaveType}. Level 1 sudah approve.`,l.id);
      pushNotif(l.empNik,'Cuti Disetujui Level 1',`${l.leaveType} Anda disetujui ${CE.name}. Menunggu approval Level 2.`,l.id);
    }
  }
  try {
    await api('PUT','leaves',{id:lid,action:apiAction,approver_nik:CE.nik,reason:note});
    if(balUpdate) apiUpdateEmp(balUpdate.nik,balUpdate).catch(()=>{});
    S('ess5_leaves',leaves);closeMo();toast(action==='approve'?'Diproses ✓':'Ditolak');renderApproval();
  } catch(e){toast('Gagal: '+e.message);}
}

async function doBulkUpdate(){
  const days=parseInt(document.getElementById('bulk-days').value);const year=parseInt(document.getElementById('bulk-year').value);
  if(!days||days<1)return toast('Masukkan jumlah hari valid');
  const dept=document.getElementById('bulk-dept')?.value||'ALL';
  if(!confirm(`Tambah saldo cuti tahunan (Y1) ${dept==='ALL'?'semua karyawan':'dept '+dept} untuk tahun ${year}?`))return;
  try {
    const result=await api('POST','balance/bulk',{dept,amount:days,year});
    // Update in-memory
    const emps=G('ess5_emps',[]);
    emps.forEach((e,i)=>{
      if(dept!=='ALL'&&e.dept!==dept)return;
      if(!e.joinDate)return;
      const jd=new Date(e.joinDate+' 12:00:00');
      const elig=new Date(jd.getFullYear()+1,jd.getMonth()+1,1);
      if(elig.getFullYear()>year)return;
      let add=days;
      if(elig.getFullYear()===year){const ml=12-elig.getMonth();add=Math.round((ml/12)*days)}
      if(add>0)emps[i].annY1=(emps[i].annY1||0)+add;
    });
    S('ess5_emps',emps);if(!isSysUser()&&CE)CE=emps.find(e=>e.nik===CE.nik)||CE;
    toast(`✓ Saldo Y1 diupdate untuk ${result.updated} karyawan`);
  } catch(e){toast('Gagal: '+e.message);}
}

function toCSV(arr){return arr.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')}
function dlCSV(fn,rows){
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url);
}

/* ══ CSV UPLOAD 11 KOLOM ══ */
function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(c===','&&!inQ){result.push(cur);cur=''}else cur+=c}
  result.push(cur);return result;
}

async function processCSV(){
  const raw=document.getElementById('csv-manual').value.trim();
  if(!raw)return toast('Masukkan data CSV');

  const emps=G('ess5_emps',[]);
  const depts=G('ess5_depts',[]);
  const toInsert=[];
  const newDepts=[];
  let skipped=0;

  // Kumpulkan semua username yang sudah ada (DB + yang akan diinsert)
  // Ini fix masalah duplicate username
  const usedUsernames=new Set(emps.map(e=>{
    // Ambil username dari emp_users jika ada, atau generate dari nama
    return (e.username||autoUser(e.name,[]));
  }));

  raw.split('\n').filter(Boolean).forEach(line=>{
    const p=parseCSVLine(line);
    if(p.length<4||!p[1]||!p[2])return;
    const nik=p[1].trim(),name=p[2].trim(),dept=p[3].trim();
    const status=(p[4]||'kontrak').trim().toLowerCase();
    const y3=parseInt(p[5])||0,y2=parseInt(p[6])||0,y1=parseInt(p[7])||0,big=parseInt(p[8])||0;
    const joinDate=(p[9]||'').trim()||null;
    const permanentDate=(p[10]||'').trim()||null;

    if(!nik||!name){skipped++;return}
    if(emps.find(e=>e.nik===nik)){skipped++;return}

    // Generate username unik — cek dari usedUsernames Set
    let username=autoUser(name,[...usedUsernames]);
    // Pastikan benar-benar unik dengan tambah suffix jika perlu
    let attempt=username;let counter=2;
    while(usedUsernames.has(attempt)){attempt=username+counter;counter++;}
    username=attempt;
    usedUsernames.add(username); // Tandai sudah dipakai

    toInsert.push({
      nik,name,dept,status,
      join_date:joinDate,
      permanent_date:status==='tetap'?(permanentDate||joinDate):null,
      ann_y1:y1,ann_y2:y2,ann_y3:y3,big_leave:big,
      username,password:'12345'
    });

    // Track departemen baru
    if(dept&&!depts.includes(dept)&&!newDepts.includes(dept)){
      newDepts.push(dept);
    }
  });

  if(!toInsert.length)return toast(`Tidak ada data baru (${skipped} dilewati)`);

  // Tampilkan progress
  toast(`Mengupload ${toInsert.length} karyawan...`);

  let added=0, failed=0, failedNames=[];

  // Upload satu per satu agar bisa skip yang gagal tanpa batalkan semua
  for(const emp of toInsert){
    try {
      await api('POST','employees',emp);
      emps.push({
        nik:emp.nik,name:emp.name,dept:emp.dept,role:'employee',
        annY1:emp.ann_y1,annY2:emp.ann_y2,annY3:emp.ann_y3,
        bigLeave:emp.big_leave,status:emp.status,
        joinDate:emp.join_date,
        permanentDate:emp.permanent_date,
        username:emp.username
      });
      added++;
    } catch(e){
      failed++;
      failedNames.push(emp.name+' ('+e.message+')');
    }
  }

  // Simpan ke in-memory
  S('ess5_emps',emps);

  // Simpan departemen baru ke DB + in-memory
  if(newDepts.length>0){
    for(const dept of newDepts){
      try {
        await api('POST','departments',{name:dept});
        depts.push(dept);
      } catch(e){
        // Dept mungkin sudah ada — tidak masalah
        if(!depts.includes(dept))depts.push(dept);
      }
    }
    S('ess5_depts',depts);
  }

  document.getElementById('csv-manual').value='';

  if(failed===0){
    toast(`✓ ${added} karyawan berhasil ditambahkan${skipped?' ('+skipped+' dilewati)':''}${newDepts.length?' + '+newDepts.length+' dept baru':''}`);
  } else {
    toast(`✓ ${added} berhasil, ${failed} gagal: ${failedNames.slice(0,2).join(', ')}${failed>2?'...':''}`);
    console.error('Failed uploads:',failedNames);
  }

  renderAdminEmp();
}
function handleUpload(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('csv-manual').value=e.target.result;toast('File dimuat. Klik Proses Data.')};r.readAsText(f)}

function openMo(html){document.getElementById('mbox').innerHTML=html;document.getElementById('mo').classList.add('show')}
function closeMo(e){if(e&&e.target!==document.getElementById('mo'))return;document.getElementById('mo').classList.remove('show')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200)}
function fmtDate(iso){
  if(!iso)return '-';
  const d=new Date(iso+' 12:00:00');
  if(isNaN(d.getTime()))return '-';
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const yyyy=d.getFullYear();
  return dd+'-'+mm+'-'+yyyy;
}
function formatDates(dates){if(!dates||!dates.length)return '-';if(dates.length===1)return fmtDate(dates[0]);return `${fmtDate(dates[0])} – ${fmtDate(dates[dates.length-1])} (${dates.length}hr)`}
